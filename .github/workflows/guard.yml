name: guard
on:
  push: {}
  pull_request: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Secret guard
        run: python scripts/check_no_secrets.py
      - name: Tests
        run: python -m pytest -q
